{% extends "base.html" %}
{% block title %}Login | ISRM Student Management System{% endblock %}
{% block content %}

<section class="auth-layout">
    <div class="auth-copy">
        <p class="eyebrow">Staff Login</p>
        <h1>Access student records and academic operations.</h1>
        <p>Use your assigned staff account to open the records dashboard.</p>
    </div>
    <form method="POST" class="auth-card">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" placeholder="Username" autocomplete="username" minlength="3" maxlength="30" pattern="[A-Za-z0-9_.-]+" required>

        <label class="form-label mt-3">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Password" autocomplete="current-password" minlength="8" maxlength="64" required>

        <button class="btn btn-primary w-100 mt-4">Login</button>
        <p class="form-footnote">Need access? <a href="/signup">Create a staff account</a>.</p>
    </form>
</section>

{% endblock %}
